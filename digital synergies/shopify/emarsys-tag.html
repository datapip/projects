<script>
  (function () {
    var isDebug; // = !!{{Debug Mode}};

    // 1. Initialize Scarab Queue safely
    window.ScarabQueue = window.ScarabQueue || [];

    // 2. Inject Script if not present
    if (!document.getElementById("scarab-js-api")) {
      var js = document.createElement("script");
      js.id = "scarab-js-api";
      js.async = true;
      js.src = "//cdn.scarabresearch.com/js/1D08E42FA9E10011/scarab-v2.js";
      document.head.appendChild(js);
    }

    // 3. Customer Identity (Fires on every allowed event if email exists)
    var email = getEmail();
    if (email && window.__emarsysEmailSent !== email) {
      window.__emarsysEmailSent = email;
      ScarabQueue.push(["setEmail", email]);
      if (isDebug) console.log("[Emarsys] email set.");
    }

    var currentEvent = "{{Event}}";

    // 4. Handle Specific Events
    if (currentEvent === "search") {
      var searchTerm; //= {{search_term}};
      if (!searchTerm) return;
      ScarabQueue.push(["searchTerm", String(searchTerm)]);
      if (isDebug) console.log("[Emarsys] search set:", searchTerm);
      ScarabQueue.push(["go"]);
      return;
    }

    if (currentEvent === "view_item") {
      var items; //= {{ecommerce}} ? {{ecommerce}}["items"] : [];
      if (items && items[0]) {
        if (items[0].item_id) {
          var product = String(items[0].item_id);
          ScarabQueue.push(["view", product]);
          if (isDebug) console.log("[Emarsys] product set:", product);
        }
        var category = getCategory(items[0]);
        if (category) {
          ScarabQueue.push(["category", category]);
          if (isDebug) console.log("[Emarsys] category set:", category);
        }
      }
      ScarabQueue.push(["go"]);
      return;
    }

    if (currentEvent === "view_cart") {
      var items; //= {{ecommerce}} ? {{ecommerce}}["items"] : [];
      if (!items || !items.length) return;
      var cart = toCartItems(items);
      ScarabQueue.push(["cart", cart]);
      if (isDebug) console.log("[Emarsys] cart set:", cart);
      ScarabQueue.push(["go"]);
      return;
    }

    if (currentEvent === "add_shipping_info") {
      var email = "{{user_email}}";
      if (!email || email === "undefined" || email === "null") {
        return;
      }
      try {
        var normalised = String(email).trim().toLowerCase();
        if (normalised.indexOf("@") > 0) {
          localStorage.setItem("em_e", btoa(normalised));
          if (isDebug)
            console.log("[Emarsys] persisted email:", btoa(normalised));
        }
      } catch (e) {
        if (isDebug) console.log("[Emarsys] error in persisting email:", e);
      }
    }

    if (currentEvent === "purchase") {
      var orderId; //= {{ecommerce}} ? {{ecommerce}}["transaction_id"] : "";
      var items; //= {{ecommerce}} ? {{ecommerce}}["items"] : [];
      if (isDebug) console.log("[Emarsys] order id and items:", orderId, items);
      if (orderId) {
        var order = { orderId: String(orderId), items: toCartItems(items) };
        ScarabQueue.push(["purchase", order]);
        if (isDebug) console.log("[Emarsys] order set:", order);
      }
      ScarabQueue.push(["go"]);
      return;
    }

    // 5. Exit early in case of view_item, view_cart and purchase
    var currentPageType = "{{page_type}}";
    if (
      currentPageType === "product" ||
      currentPageType === "cart" ||
      currentPageType === "checkout" ||
      currentPageType === "search"
    ) {
      return;
    }

    // 6. Trigger for default Events
    if (isDebug) console.log("[Emarsys] default go.");
    ScarabQueue.push(["go"]);

    // ----- Helper functions -----

    function getEmail() {
      var email; //= {{user_email}};
      if (!email || email === "undefined" || email === "null") {
        var stored = localStorage.getItem("em_e");
        email = stored ? atob(stored) : null;
      }
      return email ? email.trim().toLowerCase() : "";
    }

    function getCategory(item) {
      if (!item) return "";
      var chunks = [];
      for (var i = 1; i <= 5; i++) {
        var prop = i === 1 ? "item_category" : "item_category" + i;
        if (item[prop]) {
          var trimmed = String(item[prop]).trim();
          if (trimmed) chunks.push(trimmed);
        }
      }
      return chunks.join(" > ");
    }

    function toCartItems(items) {
      return (items || []).map(function (item) {
        return {
          item: String(item.item_id || ""),
          price: Number(item.price || 0),
          quantity: Number(item.quantity || 1),
        };
      });
    }
  })();
</script>
